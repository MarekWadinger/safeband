[tool.markdownlint]
no-duplicate-heading = { siblings_only = true, allow_different_nesting = true }
line-length = { stern = true, code_blocks = true }

[tool.pytest.ini_options]
addopts = [
    "--doctest-modules",
    "--doctest-glob=README.md",
    "--verbose",
    "-ra",
    "-m not datasets and not slow",
    "--color=yes",
    "--junitxml=reports/junit/junit.xml",
    "--html=reports/junit/report/index.html",
    "--cov=.",
    "--cov-report=xml:reports/coverage/coverage.xml",
    "--cov-report=html:reports/coverage/report",
    "--cov-config=reports/.coveragerc"
]

norecursedirs = [".*", "examples", "publications", "scripts"]
doctest_optionflags = ["NORMALIZE_WHITESPACE", "NUMBER", "ELLIPSIS", "IGNORE_EXCEPTION_DETAIL"]

[tool.flake8]
exclude = ".*"
extend-ignore = ["E203"]