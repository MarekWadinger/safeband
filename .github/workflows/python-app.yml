# This workflow installs dependencies with uv, lints with ruff, type-checks
# with ty, and runs the test suite with coverage on a Python/OS matrix.

name: Python application

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.os }} / ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}-latest
    strategy:
      fail-fast: false # allow other jobs in matrix if one fails
      matrix:
        os: [Ubuntu, macOS]
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}
      - name: Install Rust on ubuntu
        if: matrix.os == 'Ubuntu'
        # river is built from a git fork (see [tool.uv.sources]) and needs a
        # Rust toolchain on Linux.
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- --default-toolchain=nightly --profile=minimal -y && rustup show
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Lint with ruff
        run: |
          uv run ruff check .
          uv run ruff format --check .
      - name: Type-check with ty
        run: uv run ty check . --ignore unresolved-import
      - name: Test with pytest
        # Coverage flags live in [tool.pytest.ini_options] addopts.
        run: uv run pytest .
      - name: Publish coverage summary
        # Guarded so a missing .coverage (early test abort) does not replace
        # the pytest failure with a confusing coverage error.
        if: always()
        run: |
          if [ -f .coverage ]; then
            uv run coverage report --format=markdown >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No .coverage file found; skipping coverage summary." >> "$GITHUB_STEP_SUMMARY"
          fi
      - name: Upload coverage report artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-${{ matrix.os }}-${{ matrix.python-version }}
          path: reports/coverage/coverage.xml
          if-no-files-found: ignore
      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v7
        with:
          files: reports/coverage/coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}

  notebooks:
    name: Execute notebooks
    # Notebook execution is too slow for a local pre-push hook; PRs to
    # main are the gate instead (make verify-notebooks, worktree untouched).
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
      - name: Install Rust
        # river is built from a git fork (see [tool.uv.sources]) and needs a
        # Rust toolchain on Linux.
        run: |
          curl https://sh.rustup.rs -sSf | sh -s -- --default-toolchain=nightly --profile=minimal -y && rustup show
      - name: Install dependencies
        run: uv sync --all-groups
      - name: Execute all example notebooks
        run: make verify-notebooks
