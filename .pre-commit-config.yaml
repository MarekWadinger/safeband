# https://pre-commit.com
exclude: "examples|reports"
# Install hooks for every stage referenced below, so a plain
# `pre-commit install` wires up the commit, commit-msg, and push gates.
default_install_hook_types:
  - pre-commit
  - commit-msg
  - pre-push
  - pre-merge-commit
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: debug-statements #Check for debugger imports and breakpoint() in python files
        stages: [pre-commit]
      - id: check-ast #Simply check whether files parse as valid python
        stages: [pre-commit]
      - id: fix-byte-order-marker #removes UTF-8 byte order marker
        stages: [pre-commit]
      - id: check-json
        stages: [pre-commit]
      - id: detect-private-key # detect-private-key is not in repo
        stages: [pre-commit]
      - id: check-yaml
        stages: [pre-commit]
      - id: check-added-large-files
        stages: [pre-commit]
      - id: check-shebang-scripts-are-executable
        stages: [pre-commit]
      - id: check-case-conflict #Check for files with names that would conflict on a case-insensitive filesystem like MacOS HFS+ or Windows FAT
        stages: [pre-commit]
      - id: end-of-file-fixer #Makes sure files end in a newline and only a newline
        stages: [pre-commit]
      - id: trailing-whitespace
        stages: [pre-commit]
      - id: mixed-line-ending
        stages: [pre-commit]
  - repo: local
    hooks:
      - id: ruff
        name: ruff
        entry: uv run ruff check
        language: system
        args: [--fix, --exit-non-zero-on-fix]
        types_or: [python, pyi, jupyter]
        stages: [pre-commit]
      - id: ruff-format
        name: ruff-format
        entry: uv run ruff format
        language: system
        types_or: [python, pyi, jupyter]
        stages: [pre-commit]
      - id: ruff-era001
        name: ruff ERA001 (no commented-out code on push)
        entry: uv run ruff check --isolated --select ERA001 .
        language: system
        pass_filenames: false
        stages:
          - "pre-push"
          - "pre-merge-commit"
  - repo: https://github.com/asottile/blacken-docs
    rev: 1.20.0
    hooks:
      - id: blacken-docs #blacken-docs is a pre-commit hook that runs to check for issues in the docs
        additional_dependencies: [black]
        stages: [pre-commit]
  - repo: https://github.com/MarekWadinger/doc-checks
    rev: v0.2.0
    hooks:
      # doc-checks requires Python >=3.13; the project itself pins 3.12
      - id: doc-check-make-refs
        language_version: python3.13
        stages: [pre-commit]
      - id: doc-check-cd-refs
        language_version: python3.13
        stages: [pre-commit]
      - id: doc-check-py-imports
        language_version: python3.13
        stages: [pre-commit]
      - id: doc-check-mermaid
        language_version: python3.13
        stages: [pre-commit]
  - repo: https://github.com/roy-ht/pre-commit-jupyter
    rev: v1.2.1
    hooks:
      - id: jupyter-notebook-cleanup
        args:
          - --remove-kernel-metadata
          - --pin-patterns
          - "[pin];[donotremove]"
        stages: [pre-commit]
  - repo: local
    hooks:
      - id: ty
        name: ty check
        entry: uv run ty check . --ignore unresolved-import
        language: python
        pass_filenames: false
        stages:
          - "pre-push"
          - "pre-merge-commit"
      - id: pytest-check
        name: pytest-check
        language: system
        types: [python]
        entry: uv run pytest
        pass_filenames: false
        always_run: false
        args: [--doctest-modules]
        stages: [pre-push]
      - id: verify-notebooks
        name: verify-notebooks (execute to temp dir, worktree untouched)
        language: system
        types_or: [python, jupyter]
        entry: make verify-notebooks
        pass_filenames: false
        stages:
          - "pre-push"
          - "pre-merge-commit"
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.16.3
    hooks:
      - id: commitizen
        stages: [commit-msg]
      - id: commitizen-branch
        stages: [pre-push]
